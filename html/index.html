<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15色投票アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="container-fluid">
        <!-- フェーズ 1: カラー選択 -->
        <section id="selection-phase" class="phase">
            <header>
                <h1>カラー選択</h1>
                <p>以下の18色の中から、<strong>いらない3色</strong>を選んでください。</p>
                <div class="counter-container">
                    除外数: <span id="selection-count">0</span> / 3
                </div>
            </header>
            <div id="color-grid-selection" class="color-grid"></div>
            <div class="actions">
                <button id="proceed-btn" disabled>投票画面に進む</button>
            </div>
        </section>

        <!-- フェーズ 2: 投票 -->
        <section id="voting-phase" class="phase hidden">
            <div class="main-layout">
                <!-- 左サイドバー: タグソース用 -->
                <aside class="sidebar left-sidebar">
                    <h3>タグソース</h3>
                    <div id="source-color-list" class="source-list"></div>
                </aside>

                <!-- 中央: メイン投票エリア -->
                <main class="content-area">
                    <header>
                        <h1 id="round-title">第1回 投票画面</h1>
                        <div class="mode-selector">
                            <button id="mode-like" class="mode-btn active">好き (Like)</button>
                            <button id="mode-dislike" class="mode-btn">嫌い (Dislike)</button>
                            <button id="mode-no" class="mode-btn">ダメ (No)</button>
                            <button id="mode-fit" class="mode-btn">合う (Fit)</button>
                            <button id="mode-not-fit" class="mode-btn">合わない (Not Fit)</button>
                        </div>
                        <div id="status-bar" class="status-bar">モードを選択してください</div>
                    </header>
                    <div id="color-grid-voting" class="color-grid"></div>
                    <div class="actions secondary">
                        <button id="next-round-btn">次の回を作成</button>
                        <button id="reset-btn" class="danger">最初からやり直す</button>
                        <button id="clear-votes-btn">この回の投票をクリア</button>
                    </div>
                </main>

                <!-- 右サイドバー: ラウンドメニュー -->
                <aside class="sidebar right-sidebar">
                    <h3>ラウンドメニュー</h3>
                    <div id="round-menu" class="round-menu"></div>
                </aside>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
